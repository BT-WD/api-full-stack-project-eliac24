<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Transit Tracker</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <header>
    <h1>NYC Transit Tracker</h1>
    <p>Real-time subway &amp; bus updates</p>
  </header>

  <section id="line-status">
    <h2>Line Status</h2>
    <div id="line-container"></div>
  </section>

  <section id="arrivals">
    <h2>Check Arrivals</h2>
    <div class="search-row">
      <input type="text" id="station-input" placeholder="e.g. Times Sq, Canal St…">
      <button id="search-btn">Search</button>
    </div>
    <div id="arrival-results"></div>
  </section>

  <section id="alerts">
    <h2>Service Alerts</h2>
    <div id="alerts-container"></div>
  </section>

  <section id="favorites">
    <h2>Favorites</h2>
    <div id="favorites-container"></div>
  </section>

  <div id="toast"></div>

  <script src="index.js"></script>
</body>
</html>
